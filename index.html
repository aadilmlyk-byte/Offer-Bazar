<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Bazar</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

</head>

<body>

<header>
🛍️ Offer Bazar
</header>

<input
type="text"
id="search"
class="search"
placeholder="Search Products..."
onkeyup="searchProducts()">

<div class="banner">
🔥 Mega Sale - Up To 70% OFF 🔥
</div>

<div id="products">

<div class="product-card">
<img src="lipstick.png" width="150">
<h3>Matte Liquid Lipstick</h3>
<p>⭐⭐⭐⭐⭐ 4.8</p>
<h2>₹299</h2>
<p>🚚 Delivery ₹49</p>
<button onclick="buyNow('Matte Liquid Lipstick',299)">Buy Now</button>
</div>

<div class="product-card">
<img src="earbuds.png" width="150">
<h3>OnePlus Wireless Earbuds</h3>
<p>⭐⭐⭐⭐⭐ 4.9</p>
<h2>₹599</h2>
<p>🚚 Delivery ₹49</p>
<button onclick="buyNow('OnePlus Earbuds',599)">Buy Now</button>
</div>

<div class="product-card">
<img src="powerbank.png" width="150">
<h3>Magnetic Wireless Power Bank</h3>
<p>⭐⭐⭐⭐⭐ 4.8</p>
<h2>₹499</h2>
<p>🚚 Delivery ₹49</p>
<button onclick="buyNow('Power Bank',499)">Buy Now</button>
</div>

<div class="product-card">
<img src="car.jpeg" width="150">
<h3>360° RC Drift Car</h3>
<p>⭐⭐⭐⭐⭐ 4.9</p>
<h2>₹699</h2>
<p>🚚 Delivery ₹49</p>
<button onclick="buyNow('RC Drift Car',699)">Buy Now</button>
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Offer Bazar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
🛍️ Offer Bazar - Secure Checkout
</header>

<div style="padding:20px;max-width:600px;margin:auto;">

<h2>Delivery Address</h2>

<input type="text" placeholder="Full Name" class="search"><br><br>

<input type="text" placeholder="Mobile Number" class="search"><br><br>

<input type="text" placeholder="House / Flat No." class="search"><br><br>

<input type="text" placeholder="Area / Street" class="search"><br><br>

<input type="text" placeholder="City" class="search"><br><br>

<input type="text" placeholder="State" class="search"><br><br>

<input type="text" placeholder="PIN Code" class="search"><br><br>
<h2>Order Summary</h2>

<div style="background:#fff;padding:15px;border-radius:10px;margin-bottom:20px;">
<p><b>Product:</b> <span id="productName"></span></p>

<p><b>Price:</b> ₹<span id="productPrice"></span></p>

<p><b>Delivery:</b> ₹49</p>

<h3>Total: ₹<span id="totalPrice"></span></h3>
</div>

<script>
let product = localStorage.getItem("productName");
let price = Number(localStorage.getItem("productPrice"));

document.getElementById("productName").innerText = product;
document.getElementById("productPrice").innerText = price;
document.getElementById("totalPrice").innerText = price + 49;
</script>
<h2>Payment</h2>

<p><b>UPI ID:</b> 9103315412@fam</p>

<img src="WhatsApp Image 2026-07-06 at 5.39.10 AM.jpeg"
width="250">

<br><br>

<label><b>Upload Payment Screenshot</b></label>

<input type="file">

<br><br>

<h2>Total</h2>

<p>Product Price + ₹49 Delivery</p>

<button style="width:100%;padding:15px;background:#ff6600;color:white;border:none;border-radius:8px;font-size:18px;">
Place Order
</button>

</div>

</body>
</html>
